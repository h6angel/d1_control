# B-spline 轨迹跟踪：/planning/bspline + /ov_msckf/poseimu -> /d1_demo/cmd_vel_raw
bspline_trajectory_tracker_node:
  ros__parameters:
    pose_topic: /ov_msckf/poseimu
    bspline_topic: /planning/bspline
    cmd_vel_topic: /d1_demo/cmd_vel_raw
    control_rate_hz: 30.0
    pose_timeout_sec: 0.5
    traj_timeout_sec: 1.0
    k_x: 1.2
    k_y: 2.0
    k_heading: 2.2
    min_linear_x: 0.0
    max_linear_x: 1.5
    max_angular_z: 1.0
    max_linear_acc: 1.5
    max_angular_acc: 1.0
    min_speed_for_heading: 0.05
    min_tracking_linear_x: 0.03
    heading_stop_for_linear_rad: 1.2
    lookahead_u: 0.08
    near_goal_dist_m: 0.05
    traj_time_scale: 3.0
    anchor_to_current_pose_on_new_traj: true
    anchor_search_samples: 80
