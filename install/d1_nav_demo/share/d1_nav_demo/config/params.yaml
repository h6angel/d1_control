# 默认演示：解析圆轨迹 + OpenVINS 位姿 -> cmd_vel（不再依赖 EgoPlanner / B-spline）
circle_trajectory_tracker_node:
  ros__parameters:
    pose_topic: /ov_msckf/poseimu
    cmd_vel_topic: /d1_demo/cmd_vel_raw
    control_rate_hz: 20.0
    circle_center_x: 0.0
    circle_center_y: 0.0
    circle_radius_m: 1.0
    clockwise: false
    nominal_linear_x: 0.2
    max_linear_x: 0.25
    max_angular_z: 0.8
    k_radius: 0.8
    k_heading: 1.2
    pose_timeout_sec: 0.5

# 可选：若仍要用离散 Path + path_tracker，可单独启动下列参数对应节点
fake_bspline_to_path_node:
  ros__parameters:
    # [FAKE INPUT] TODO: replace with your real EgoPlanner bspline adapter.
    input_path_topic: /d1_demo/fake_bspline_path
    output_path_topic: /d1_demo/path
    output_frame_id: global

path_tracker_node:
  ros__parameters:
    pose_topic: /ov_msckf/poseimu
    path_topic: /d1_demo/path
    cmd_vel_topic: /d1_demo/cmd_vel_raw
    control_rate_hz: 20.0
    lookahead_m: 0.6
    goal_tolerance_m: 0.15
    heading_kp: 1.2
    max_linear_x: 0.25
    max_angular_z: 0.8
    pose_timeout_sec: 0.5
